<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{GAME_NAME}}</title>

    <!-- Game styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Bardic API — available to custom.js for registering hooks and directives -->
    <script>
        (function () {
            const VALID_EVENTS = ['start', 'passageRender', 'beforeChoice'];

            window.Bardic = {
                // Internal registries (read by the game engine module)
                _directives: {},
                _sidebar: null,
                _backgrounds: {},
                _hooks: {},

                // Register a custom directive renderer
                // Usage: Bardic.directive('card_spread', (data) => { ... return domElement; })
                directive(name, renderFn) {
                    if (typeof renderFn !== 'function') {
                        console.error(`Bardic.directive('${name}'): second argument must be a function`);
                        return;
                    }
                    this._directives[name] = renderFn;
                },

                // Register a sidebar renderer
                // Usage: Bardic.sidebar((state) => `<h3>HP: ${state.hp}</h3>`)
                sidebar(renderFn) {
                    if (typeof renderFn !== 'function') {
                        console.error('Bardic.sidebar(): argument must be a function');
                        return;
                    }
                    this._sidebar = renderFn;
                },

                // Set per-passage background mapping
                // Usage: Bardic.backgrounds({ 'ReadingRoom': '/assets/bg.png' })
                backgrounds(mapping) {
                    Object.assign(this._backgrounds, mapping);
                },

                // Register a lifecycle hook
                // Valid events: 'start', 'passageRender', 'beforeChoice'
                on(event, handler) {
                    if (!VALID_EVENTS.includes(event)) {
                        const suggestion = VALID_EVENTS.find(e =>
                            e.toLowerCase().includes(event.toLowerCase()) ||
                            event.toLowerCase().includes(e.toLowerCase())
                        );
                        console.warn(
                            `Bardic.on('${event}'): unknown event.` +
                            (suggestion ? ` Did you mean '${suggestion}'?` : '') +
                            ` Valid events: ${VALID_EVENTS.join(', ')}`
                        );
                    }
                    if (!this._hooks[event]) this._hooks[event] = [];
                    this._hooks[event].push(handler);
                },

                // Open a modal overlay (callable from directive renderers)
                openModal(contentHtml) {
                    const overlay = document.getElementById('modal-overlay');
                    const content = document.getElementById('modal-content');
                    if (overlay && content) {
                        content.innerHTML = contentHtml;
                        overlay.classList.remove('hidden');
                    }
                },

                // Close the modal overlay
                closeModal() {
                    const overlay = document.getElementById('modal-overlay');
                    if (overlay) overlay.classList.add('hidden');
                },
            };
        })();
    </script>
</head>

<body>
    <!-- Loading screen (shown while Pyodide loads) -->
    <div id="loading">
        <div class="loading-content">
            <h1>{{GAME_NAME}}</h1>
            <p id="loading-status">Initializing...</p>
            <div class="spinner"></div>
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
            <p class="loading-hint" id="loading-hint"></p>
        </div>
    </div>

    <!-- Game container (hidden until loaded) -->
    <div id="game" style="display: none;">
        <header>
            <h1 id="game-title">{{GAME_NAME}}</h1>
            <nav class="game-controls">
                <button id="sidebar-toggle" title="Toggle sidebar" class="sidebar-toggle-btn">☰</button>
                <button id="undo-btn" title="Undo (go back)" disabled>←</button>
                <button id="redo-btn" title="Redo (go forward)" disabled>→</button>
                <span class="controls-separator"></span>
                <button id="save-btn" title="Save game">Save</button>
                <button id="load-btn" title="Load game">Load</button>
                <button id="restart-btn" title="Restart game">Restart</button>
            </nav>
        </header>

        <div class="game-layout">
            <!-- Sidebar (collapsed by default, toggled by ☰) -->
            <aside id="sidebar" class="sidebar collapsed">
                <div id="sidebar-content">
                    <!-- Populated by render directives, renderSidebar hook, or game state -->
                </div>
            </aside>

            <!-- Main story area -->
            <main>
                <article id="story-content">
                    <!-- Passage content renders here -->
                </article>

                <section id="choices">
                    <!-- Choice buttons render here -->
                </section>
            </main>
        </div>

        <footer>
            <p>Powered by <a href="https://github.com/katelouie/bardic" target="_blank">Bardic</a></p>
        </footer>

        <!-- Modal overlay (reusable for book views, inventory, card details, etc.) -->
        <div id="modal-overlay" class="modal-overlay hidden" role="dialog" aria-modal="true">
            <div id="modal-content" class="modal-content">
                <!-- Populated dynamically by openModal() -->
            </div>
        </div>
    </div>

    <!-- Load Pyodide from local files -->
    <script src="./pyodide/pyodide.js"></script>

    <script type="module">
        // Game state
        let pyodide = null;
        let engine = null;

        // Progress updates
        function updateLoading(status, hint = '', progress = null) {
            document.getElementById('loading-status').textContent = status;
            document.getElementById('loading-hint').textContent = hint;
            if (progress !== null) {
                document.getElementById('progress-bar').style.width = `${progress}%`;
            }
        }

        // Initialize Pyodide and the game
        async function init() {
            try {
                updateLoading('Loading Python runtime...', 'This may take a moment', 10);

                // Load Pyodide from local files
                pyodide = await loadPyodide({
                    indexURL: './pyodide/'
                });

                updateLoading('Loading packages...', '', 40);

                // Load micropip for package installation
                await pyodide.loadPackage(['micropip'], { messageCallback: () => { } });

                // Discover and install any .whl packages in the pyodide folder
                updateLoading('Installing dependencies...', '', 60);

                // List of packages to try installing (will skip if not present)
                const possiblePackages = [
                    'pyyaml', 'regex', 'pillow', 'numpy', 'python_dateutil',
                    'networkx', 'jinja2', 'markupsafe', 'more_itertools',
                    'sortedcontainers', 'attrs', 'nltk', 'rich', 'sympy', 'pygments'
                ];

                // Try to install each package from local wheels
                for (const pkgName of possiblePackages) {
                    try {
                        // Try to fetch the wheel file listing
                        const response = await fetch(`./pyodide/${pkgName}`, { method: 'HEAD' });
                        // If HEAD fails, the package isn't bundled - skip it silently
                    } catch (e) {
                        // Package not present, skip
                    }
                }

                // Use Python to install available local packages
                await pyodide.runPythonAsync(`
import micropip
import os
from pathlib import Path

# Try to install from local wheel files
# micropip will silently skip if the file doesn't exist
local_packages = [
    './pyodide/pyyaml-6.0.2-cp313-cp313-pyodide_2025_0_wasm32.whl',
    './pyodide/regex-2024.11.6-cp313-cp313-pyodide_2025_0_wasm32.whl',
    './pyodide/pillow-11.3.0-cp313-cp313-pyodide_2025_0_wasm32.whl',
    './pyodide/numpy-2.2.5-cp313-cp313-pyodide_2025_0_wasm32.whl',
    './pyodide/python_dateutil-2.9.0.post0-py2.py3-none-any.whl',
    './pyodide/networkx-3.4.2-py3-none-any.whl',
    './pyodide/jinja2-3.1.6-py3-none-any.whl',
    './pyodide/markupsafe-3.0.2-cp313-cp313-pyodide_2025_0_wasm32.whl',
    './pyodide/more_itertools-10.6.0-py3-none-any.whl',
    './pyodide/sortedcontainers-2.4.0-py2.py3-none-any.whl',
    './pyodide/attrs-25.2.0-py3-none-any.whl',
    './pyodide/nltk-3.9.1-py3-none-any.whl',
    './pyodide/rich-13.9.4-py3-none-any.whl',
    './pyodide/sympy-1.13.3-py3-none-any.whl',
    './pyodide/pygments-2.19.1-py3-none-any.whl',
]

for pkg in local_packages:
    try:
        await micropip.install(pkg)
    except Exception as e:
        # Package not bundled or failed to install - that's OK for minimal bundles
        pass
`);

                updateLoading('Loading Bardic engine...', '', 70);

                // Load runtime engine modules into Pyodide's virtual filesystem
                const runtimeModules = [
                    '__init__.py', 'types.py', 'hooks.py', 'directives.py',
                    'renderer.py', 'executor.py', 'state.py', 'browser.py', 'engine.py'
                ];

                // Load stdlib modules
                const stdlibModules = [
                    '__init__.py', 'dice.py', 'inventory.py',
                    'economy.py', 'relationship.py', 'quest.py'
                ];

                // Create package structure in Pyodide's virtual FS
                pyodide.FS.mkdirTree('/bardic/runtime');
                pyodide.FS.mkdirTree('/bardic/stdlib');

                // Write bardic package __init__.py
                pyodide.FS.writeFile('/bardic/__init__.py', '');

                // Write runtime modules
                for (const filename of runtimeModules) {
                    try {
                        const response = await fetch('./bardic/runtime/' + filename);
                        if (response.ok) {
                            const code = await response.text();
                            pyodide.FS.writeFile('/bardic/runtime/' + filename, code);
                        }
                    } catch (e) {
                        console.log('Note: Could not load runtime/' + filename);
                    }
                }

                updateLoading('Loading Bardic stdlib...', '', 80);

                // Write stdlib modules
                for (const filename of stdlibModules) {
                    try {
                        const response = await fetch('./bardic/stdlib/' + filename);
                        if (response.ok) {
                            const code = await response.text();
                            pyodide.FS.writeFile('/bardic/stdlib/' + filename, code);
                        }
                    } catch (e) {
                        console.log('Note: Could not load stdlib/' + filename);
                    }
                }

                updateLoading('Starting game...', '', 90);

                // Load the game data
                const gameResponse = await fetch('./game.json');
                const gameText = await gameResponse.text();
                pyodide.FS.writeFile('/game.json', gameText);

                // Initialize the engine with environment="browser"
                await pyodide.runPythonAsync(`
import sys
sys.path.insert(0, '/')

import json
from bardic.runtime.engine import BardEngine

with open('/game.json', 'r') as f:
    game_data = json.load(f)

engine = BardEngine(game_data, environment="browser")
`);

                // Hide loading, show game
                document.getElementById('loading').style.display = 'none';
                document.getElementById('game').style.display = 'block';

                // Measure actual header height for fixed sidebar offset
                const headerHeight = document.querySelector('header').offsetHeight;
                document.documentElement.style.setProperty('--header-height', headerHeight + 'px');

                // Set up event listeners (before first render so modal dismiss works)
                setupEventListeners();

                // Render initial passage
                renderPassage();

                // Fire start hooks
                for (const handler of (Bardic._hooks.start || [])) {
                    try {
                        handler();
                    } catch (e) {
                        console.warn('Bardic.on(\'start\') handler error:', e);
                    }
                }

            } catch (error) {
                updateLoading('Error loading game', error.message, 0);
                console.error('Failed to initialize:', error);
            }
        }

        // Render the current passage
        // transition: whether to animate the passage change (false for initial load)
        async function renderPassage(transition = false) {
            const contentDiv = document.getElementById('story-content');
            const choicesDiv = document.getElementById('choices');

            // Fade out old content if transitioning
            if (transition) {
                contentDiv.classList.add('passage-exit');
                choicesDiv.classList.add('passage-exit');
                await new Promise(r => setTimeout(r, 200));
            }

            const result = await pyodide.runPythonAsync(`
import json
output = engine.current()

def _serialize(obj):
    """JSON serializer that handles stdlib objects with to_dict()."""
    if hasattr(obj, 'to_dict'):
        return obj.to_dict()
    if hasattr(obj, '__dict__'):
        return {k: v for k, v in obj.__dict__.items() if not k.startswith('_')}
    raise TypeError(f"Object of type {type(obj).__name__} is not JSON serializable")

json.dumps({
    'content': output.content,
    'choices': output.choices,
    'passage_id': output.passage_id,
    'render_directives': output.render_directives or [],
    'input_directives': output.input_directives or [],
}, default=_serialize)
`);

            const output = JSON.parse(result);

            // Update content
            contentDiv.innerHTML = renderMarkdown(output.content);

            // Process render directives
            if (output.render_directives.length > 0) {
                const directivesContainer = document.createElement('div');
                directivesContainer.className = 'render-directives';

                for (const directive of output.render_directives) {
                    const el = renderDirective(directive);
                    if (el) directivesContainer.appendChild(el);
                }

                contentDiv.appendChild(directivesContainer);
            }

            // Update choices
            choicesDiv.innerHTML = '';

            if (output.choices && output.choices.length > 0) {
                output.choices.forEach((choice, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice.text;
                    btn.addEventListener('click', () => makeChoice(index));
                    choicesDiv.appendChild(btn);
                });
            } else {
                // End of story
                const endDiv = document.createElement('div');
                endDiv.className = 'end-screen';
                endDiv.innerHTML = '<h2>The End</h2><p>Thank you for playing!</p>';

                const restartBtn = document.createElement('button');
                restartBtn.className = 'restart-btn';
                restartBtn.textContent = 'Play Again';
                restartBtn.addEventListener('click', restartGame);
                endDiv.appendChild(restartBtn);

                choicesDiv.appendChild(endDiv);
            }

            // Fade in new content if transitioning
            if (transition) {
                contentDiv.classList.remove('passage-exit');
                choicesDiv.classList.remove('passage-exit');
                contentDiv.classList.add('passage-enter');
                choicesDiv.classList.add('passage-enter');

                // Clean up animation classes after they finish
                setTimeout(() => {
                    contentDiv.classList.remove('passage-enter');
                    choicesDiv.classList.remove('passage-enter');
                }, 200);
            }

            // Apply per-passage background if game author registered backgrounds
            if (Object.keys(Bardic._backgrounds).length > 0) {
                const bg = Bardic._backgrounds[output.passage_id];
                if (bg) {
                    document.body.style.backgroundImage = `url(${bg})`;
                    document.body.style.backgroundSize = 'cover';
                    document.body.style.backgroundPosition = 'center';
                } else {
                    document.body.style.backgroundImage = 'none';
                }
            }

            // Scroll to top
            contentDiv.scrollTop = 0;
            window.scrollTo(0, 0);

            // Update undo/redo button states
            updateUndoRedoButtons();

            // Update sidebar if game author registered a sidebar renderer
            if (Bardic._sidebar) {
                try {
                    const stateJson = await pyodide.runPythonAsync(`
import json
json.dumps(dict(engine.state), default=_serialize)
`);
                    const state = JSON.parse(stateJson);
                    const sidebarHtml = Bardic._sidebar(state);
                    if (sidebarHtml) {
                        document.getElementById('sidebar-content').innerHTML = sidebarHtml;
                        // Only auto-open if the player hasn't manually toggled it
                        if (!sidebarManuallyToggled) {
                            document.getElementById('sidebar').classList.remove('collapsed');
                            document.querySelector('.game-layout').classList.add('sidebar-open');
                        }
                    }
                } catch (e) {
                    console.warn('Bardic.sidebar() renderer error:', e);
                }
            }

            // Fire passageRender hooks
            for (const handler of (Bardic._hooks.passageRender || [])) {
                try {
                    handler(output.passage_id, output);
                } catch (e) {
                    console.warn('Bardic.on(\'passageRender\') handler error:', e);
                }
            }
        }

        // Handle player choice
        async function makeChoice(index) {
            // Fire beforeChoice hooks
            for (const handler of (Bardic._hooks.beforeChoice || [])) {
                try {
                    handler(index);
                } catch (e) {
                    console.warn('Bardic.on(\'beforeChoice\') handler error:', e);
                }
            }

            await pyodide.runPythonAsync(`engine.choose(${index})`);
            renderPassage(true);
        }

        // Save game
        async function saveGame() {
            const slotName = prompt('Enter save name:', 'quicksave');
            if (slotName) {
                try {
                    await pyodide.runPythonAsync(`engine.save_to_browser("${slotName}")`);
                    showNotification(`Game saved to '${slotName}'`);
                } catch (e) {
                    showNotification('Failed to save: ' + e.message, true);
                }
            }
        }

        // Load game
        async function loadGame() {
            const saves = await pyodide.runPythonAsync(`
import json
json.dumps(engine.list_browser_saves())
`);
            const saveList = JSON.parse(saves);

            if (saveList.length === 0) {
                showNotification('No saves found');
                return;
            }

            const savesStr = saveList.map((s, i) => `${i + 1}. ${s}`).join('\n');
            const choice = prompt(`Available saves:\n${savesStr}\n\nEnter save name:`, saveList[0]);

            if (choice) {
                try {
                    const loaded = await pyodide.runPythonAsync(`engine.load_from_browser("${choice}")`);
                    if (loaded) {
                        renderPassage(true);
                        showNotification(`Loaded '${choice}'`);
                    } else {
                        showNotification(`Save '${choice}' not found`, true);
                    }
                } catch (e) {
                    showNotification('Failed to load: ' + e.message, true);
                }
            }
        }

        // Restart game
        async function restartGame() {
            await pyodide.runPythonAsync(`
# Reload from the file we already saved
with open('/game.json', 'r') as f:
    game_data = json.load(f)

engine = BardEngine(game_data, environment="browser")
`);
            renderPassage(true);
            showNotification('Game restarted');
        }

        // Undo last choice
        async function undoChoice() {
            const result = await pyodide.runPythonAsync(`engine.undo()`);
            if (result) {
                renderPassage(true);
                showNotification('Undid last choice');
            } else {
                showNotification('Nothing to undo', true);
            }
        }

        // Redo undone choice
        async function redoChoice() {
            const result = await pyodide.runPythonAsync(`engine.redo()`);
            if (result) {
                renderPassage(true);
                showNotification('Redid choice');
            } else {
                showNotification('Nothing to redo', true);
            }
        }

        // Update undo/redo button states
        async function updateUndoRedoButtons() {
            const canUndo = await pyodide.runPythonAsync(`engine.can_undo()`);
            const canRedo = await pyodide.runPythonAsync(`engine.can_redo()`);

            document.getElementById('undo-btn').disabled = !canUndo;
            document.getElementById('redo-btn').disabled = !canRedo;
        }

        // ── Render Directive System ──

        // Built-in directive renderers
        // Game authors register custom renderers via Bardic.directive() in custom.js
        const builtinDirectiveRenderers = {
            // Display an image
            'image': (data) => {
                const img = document.createElement('img');
                img.src = data.src || data.arg_0 || '';
                img.alt = data.alt || '';
                img.className = 'story-image directive-image';
                if (data.width) img.style.width = data.width;
                if (data.pixel) img.classList.add('pixel');
                return img;
            },

            // Generic HTML block
            'html': (data) => {
                const el = document.createElement('div');
                el.className = 'directive-html';
                el.innerHTML = data.content || data.arg_0 || '';
                return el;
            },

            // Styled text block
            'text_block': (data) => {
                const el = document.createElement('div');
                el.className = 'directive-text-block';
                if (data.style) el.setAttribute('style', data.style);
                el.innerHTML = renderMarkdown(data.content || data.arg_0 || '');
                return el;
            },

            // Sidebar update — renders into sidebar instead of main content
            'sidebar': (data) => {
                const sidebar = document.getElementById('sidebar-content');
                sidebar.innerHTML = data.content || data.arg_0 || '';
                // Auto-open only if player hasn't manually toggled
                if (!sidebarManuallyToggled) {
                    document.getElementById('sidebar').classList.remove('collapsed');
                    document.querySelector('.game-layout').classList.add('sidebar-open');
                }
                return null;  // Don't add to main content area
            },

            // Modal popup — opens content in an overlay
            'modal': (data) => {
                Bardic.openModal(data.content || data.arg_0 || '');
                return null;  // Don't add to main content area
            },
        };

        // Render a single directive by dispatching to the appropriate renderer
        function renderDirective(directive) {
            const name = directive.name;
            const data = directive.data || {};

            // Check game author's custom renderers first (registered via Bardic.directive())
            const renderer = Bardic._directives[name] || builtinDirectiveRenderers[name];

            if (renderer) {
                try {
                    return renderer(data);
                } catch (e) {
                    console.warn(`Directive renderer error for '${name}':`, e);
                }
            }

            // Fallback: show as styled data block (useful during development)
            console.warn(`No renderer for directive: ${name}`, data);
            const el = document.createElement('div');
            el.className = 'directive-fallback';
            el.innerHTML = `<small class="directive-fallback-label">[${name}]</small><pre>${JSON.stringify(data, null, 2)}</pre>`;
            return el;
        }

        // Simple markdown to HTML
        function renderMarkdown(text) {
            if (!text) return '';

            // Escape HTML
            text = text.replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');

            // Images: ![alt](src)
            text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" class="story-image">');

            // Bold: **text**
            text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

            // Italic: *text*
            text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');

            // Paragraphs
            const paragraphs = text.split('\n\n');
            const htmlParagraphs = paragraphs
                .map(p => p.replace(/\n/g, '<br>'))
                .filter(p => p.trim())
                .map(p => `<p>${p}</p>`);

            return htmlParagraphs.join('\n');
        }

        // Show notification
        function showNotification(message, isError = false) {
            const notif = document.createElement('div');
            notif.className = 'notification' + (isError ? ' error' : '');
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                if (notif.parentNode) {
                    notif.parentNode.removeChild(notif);
                }
            }, 3000);
        }

        // Track whether the player has manually toggled the sidebar
        let sidebarManuallyToggled = false;

        // Toggle sidebar visibility
        function toggleSidebar() {
            sidebarManuallyToggled = true;
            const sidebar = document.getElementById('sidebar');
            const layout = document.querySelector('.game-layout');
            sidebar.classList.toggle('collapsed');
            layout.classList.toggle('sidebar-open');
        }

        // Set up button event listeners
        function setupEventListeners() {
            document.getElementById('sidebar-toggle').addEventListener('click', toggleSidebar);
            document.getElementById('save-btn').addEventListener('click', saveGame);
            document.getElementById('load-btn').addEventListener('click', loadGame);
            document.getElementById('restart-btn').addEventListener('click', restartGame);
            document.getElementById('undo-btn').addEventListener('click', undoChoice);
            document.getElementById('redo-btn').addEventListener('click', redoChoice);

            // Modal dismiss: click on dark backdrop (not modal content)
            document.getElementById('modal-overlay').addEventListener('click', (e) => {
                if (e.target.id === 'modal-overlay') Bardic.closeModal();
            });

            // Modal dismiss: Escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') Bardic.closeModal();
            });
        }

        // Start the game
        init();
    </script>
</body>

</html>
